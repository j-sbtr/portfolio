<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate | Jasmin Sabater</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
    
  <body class="min-h-screen bg-gradient-to-b from-black to-violet-950 text-white">

    <!-- Navigation -->
    <nav>
        <div class="logo">
            <h1>JSS</h1>
        </div>

        <ul id="menuList">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="tech-stack.html">Stack</a></li>
            <li><a href="certificate.html">Certificate</a></li>
        </ul>
        <div class="menu-icon">
            <ion-icon name="menu-outline" onclick="toggleMenu()"></ion-icon>
        </div>
    </nav>


    <!-- Content -->
    <main class="flex flex-col items-center px-4 py-12 ">
      <h1 class="text-4xl mb-12 mt-5 text-white">Certification</h1>
    </main>

    <!-- Cards -->
    <section>
      <div class="card-container flex justify-center flex-wrap">
                
        <!--First cert -->
				<div class="card max-w-sm rounded-lg m-10 mt-1 px-4 py-2 group
        hover:shadow-2xl hover:bg-indigo-900/15 hover:scale-105 hover:border-white duration-500
        md:min-w-md lg:min-w-lg bg-gray-800/25 border border-gray-700">
					
        <img src ="images/ms-word-associate.jpg" alt="Word Certificate"
          class="cert-img w-full h-auto border-1 border-gray-700 rounded-md group-hover:border-white" onclick="openModal(this.src)">

          <div class="card-content">
            <h3 class="text-3xl mt-3 ml-2 mr-2 mb-1 font-bold text-center">MS Word Associate</h3>
            <div class="flex justify-end">
              <a href="https://www.certiport.com/portal/pages/credentialverification.aspx" 
              target="_blank" class="btn m-2 border border-gray-700
              hover:border-white hover:scale-105 duration-300 hover:bg-purple-900/40">Validate Here</a>
            </div>
          </div>
        </div>

				<!--Second cert -->
        <div class="card max-w-sm rounded-lg m-10 mt-1 px-4 py-2 group
        hover:shadow-2xl hover:bg-indigo-900/15 hover:scale-105 hover:border-white duration-500
        md:min-w-md lg:min-w-lg bg-gray-800/25 border border-gray-700">
					
        <img src ="images/ms-excel-associate.jpg" alt="Word Certificate"
          class="cert-img w-full h-auto border-1 border-gray-700 rounded-md group-hover:border-white" onclick="openModal(this.src)">

          <div class="card-content">
            <h3 class="text-3xl mt-3 ml-2 mr-2 mb-1 font-bold text-center">MS Excel Associate</h3>
            <div class="flex justify-end">
              <a href="https://www.certiport.com/portal/pages/credentialverification.aspx" 
              target="_blank" class="btn m-2 border border-gray-700
              hover:border-white hover:scale-105 duration-300 hover:bg-purple-900/40">Validate Here</a>
            </div>
          </div>
        </div>

      </div>
    </section>

    <!--Picture enlargement-->
    <div id="imageModal" class="fixed inset-0 hidden bg-black/80 flex items-center justify-center z-50">
      <img id="modalImg" class="max-w-[90%] max-h-[90%] rounded shadow-lg">
    </div>

    <!-- For Hamburger Nav Bar -->
    <script>
      let menuList = document.getElementById("menuList")
      menuList.style.maxHeight = "0px";
    </script>

    <script src="style.js"></script>
    
    <!-- Open source icon import -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  </body>

</html>
