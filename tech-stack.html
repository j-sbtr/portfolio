<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tech Stack | Jasmin Sabater</title>
        <link rel="stylesheet" href="style.css">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap');
        </style>
        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    </head>
    
    <body class="min-h-screen bg-gradient-to-b from-black to-violet-950 text-white">
        <!-- Navigation -->
        <nav class="md:flex md:items-center md:justify-between w-full">
            <div class="flex justify-between items-center md:ml-5">
                <span>JSS</span>

                <span class="text-3xl cursor-pointer md:hidden block">
                    <ion-icon name="menu-outline" onclick="Menu(this)"></ion-icon>
                </span>
            </div>

            <ul class="sm:flex sm:items-center sm:static sm:opacity-100 sm:pointer-events-auto
            z-50 absolute bg-[#290e5ccd] w-full left-0 sm:w-auto py-4 sm:py-0 pl-7 sm:pl-0 
            opacity-0 top-[-400px] pointer-events-none transition-all ease-in duration-500">
                <li class="mx-5 my-4 md:my-0">
                    <a href="index.html" class="text-lg">Home</a>
                </li>
                <li class="mx-5 my-4 md:my-0">
                    <a href="about.html" class="text-lg">About</a>
                </li>
                <li class="mx-5 my-4 md:my-0">
                    <a href="tech-stack.html" class="text-lg">Tech Stacks</a>
                </li>
                <li class="mx-5 my-4 md:my-0">
                    <a href="certificate.html" class="text-lg">Certifications</a>
                </li>
            </ul>
        </nav>

        <script>
			function Menu(e){
    		let list = document.querySelector('ul');
            
            if(e.name === 'menu'){
            	e.name = "close";
            	list.classList.add('top-[80px]', 'opacity-100');
            	list.classList.remove('pointer-events-none');
        	} else {
            	e.name = "menu";
            	list.classList.remove('top-[80px]', 'opacity-100');
            	list.classList.add('pointer-events-none');
        	}
		}
		</script>

        <h1>Tech Stack :></h1>

    </body>
</html>
